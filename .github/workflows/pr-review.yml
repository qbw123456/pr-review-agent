# Auto-run PR Review Agent on pull requests targeting main.
# Posts/updates a single PR comment with the review report.
#
# Required repo secrets:
#   ANTHROPIC_API_KEY
#   MODEL_ID
# Optional:
#   ANTHROPIC_BASE_URL  (e.g. https://open.bigmodel.cn/api/anthropic)

name: PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-review-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          fetch-depth: 0

      - name: Fetch base branch
        run: |
          BASE="${{ github.event.pull_request.base.ref || 'main' }}"
          # Local ref required for `git diff main...HEAD` in git_utils
          git fetch origin "${BASE}:${BASE}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run PR review agent
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MODEL_ID: ${{ secrets.MODEL_ID }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
        run: |
          BASE="${{ github.event.pull_request.base.ref || 'main' }}"
          python main.py review --base "${BASE}" --quiet-tools -o REVIEW.md

      - name: Upload review artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-review-report
          path: REVIEW.md
          if-no-files-found: ignore
          retention-days: 14

      - name: Prepare PR comment body
        if: always() && github.event_name == 'pull_request'
        env:
          REVIEW_OUTCOME: ${{ steps.review.outcome }}
        run: |
          {
            echo "<!-- pr-review-agent -->"
            echo "## 🤖 PR Review Agent（自动审查）"
            echo ""
            echo "审查范围：\`${{ github.event.pull_request.head.ref }}\` → \`${{ github.event.pull_request.base.ref }}\`"
            echo ""
            if [ -f REVIEW.md ] && [ -s REVIEW.md ]; then
              cat REVIEW.md
            elif [ "$REVIEW_OUTCOME" = "failure" ]; then
              echo "⚠️ **审查未成功完成**"
              echo ""
              echo "请到 [Actions 运行日志](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) 查看 \`Run PR review agent\` 步骤。"
              echo ""
              echo "常见原因：\`ANTHROPIC_API_KEY\` / \`MODEL_ID\` 未配置或无效、API 超时、配额不足。"
              echo ""
              echo "可在本次运行的 **Artifacts** 中下载 \`pr-review-report\`（若已生成部分输出）。"
            else
              echo "未生成审查报告（\`REVIEW.md\` 为空或不存在）。"
            fi
          } > pr-review-comment.md

      - name: Post or update PR comment
        if: always() && github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: pr-review-comment.md

      - name: Fail job if review failed
        if: steps.review.outcome == 'failure'
        run: exit 1
